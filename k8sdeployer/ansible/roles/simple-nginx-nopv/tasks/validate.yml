---
- name: Check pods status (replicas running and ready)
  k8s_info:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    kind: Pod
    namespace: "{{ namespace }}"
    label_selectors:
      - app={{ default_app_name }}
  register: pod
  until: >-
    pod.resources|default([])|length == (default_replicas | int) and
    pod | json_query('resources[*].status.containerStatuses[*].ready') | flatten |difference( [true] ) | length  == 0
  retries: 120
  delay: 3

- name: Set pod name fact
  set_fact:
    pod_name: "{{ (pod.resources | first).metadata.name }}"

- name: Debug — nginx pod(s)
  ansible.builtin.debug:
    msg:
      expected_replicas: "{{ default_replicas }}"
      pod_count: "{{ pod.resources | default([]) | length }}"
      pod_name: "{{ pod_name }}"

- name: Obtain route (OpenShift only)
  k8s_info:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    kind: Route
    namespace: "{{ namespace }}"
    label_selectors:
      - app={{ default_app_name }}
  register: nginx_route
  ignore_errors: true

# OpenShift: external URL via Route
- name: Access the site via OpenShift Route
  uri:
    url: "http://{{ nginx_route.resources[0].spec.host }}/"
    method: GET
    status_code: 200
  register: route_probe
  retries: 30
  delay: 10
  until: route_probe is success
  when: nginx_route.resources | default([]) | length > 0

- name: Debug — OpenShift Route probe
  ansible.builtin.debug:
    msg:
      status: "{{ route_probe.status | default('n/a') }}"
      url: "http://{{ nginx_route.resources[0].spec.host }}/"
  when: nginx_route.resources | default([]) | length > 0

# Kind / vanilla K8s: no Route — probe with curl inside the pod (image may not have wget).
# -s = no progress meter; -f = fail on non-2xx; omit -o /dev/null so response body (e.g. HTML) is stdout.
- name: Probe HTTP from inside pod (no OpenShift Route)
  kubernetes.core.k8s_exec:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    namespace: "{{ namespace }}"
    pod: "{{ pod_name }}"
    container: "{{ default_app_name }}"
    command: curl -sf http://127.0.0.1:{{ nginx_http_port }}/
  register: curl_probe
  until: curl_probe is succeeded
  retries: 30
  delay: 10
  when: nginx_route.resources | default([]) | length == 0

- name: Debug — in-pod curl probe (HTTP body in response_body)
  ansible.builtin.debug:
    msg:
      rc: "{{ curl_probe.rc | default('n/a') }}"
      response_body: "{{ curl_probe.stdout | default('') }}"
      stderr: "{{ curl_probe.stderr | default('') }}"
  when: nginx_route.resources | default([]) | length == 0

# No access.log check: many container nginx images log to stdout, so /var/log/nginx/access.log
# can stay empty and the old "until stdout non-empty" loop looked hung. curl -sf already
# validates HTTP success (2xx) for this app.
