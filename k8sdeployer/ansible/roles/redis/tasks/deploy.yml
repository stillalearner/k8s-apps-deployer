---
- name: Ensure namespace exists
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespace }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
  when: non_admin_user == false

- name: Create Redis secret
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "{{ app_name }}"
        namespace: "{{ namespace }}"
      stringData:
        redis-password: "{{ redis_password }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"

- name: Create Redis service
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ app_name }}"
        namespace: "{{ namespace }}"
        labels:
          name: "{{ app_name }}"
      spec:
        ports:
        - name: redis
          port: 6379
          targetPort: 6379
        selector:
          name: "{{ app_name }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"

- name: Create Redis PVC
  k8s:
    state: present
    definition: "{{ lookup('template', 'pvc.yml.j2') | from_yaml }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"

- name: Create Redis deployment
  k8s:
    state: present
    definition: "{{ lookup('template', 'deployment.yml.j2') | from_yaml }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"

- name: Wait for Redis pod to be ready
  k8s_info:
    kind: Pod
    namespace: "{{ namespace }}"
    label_selectors:
      - name={{ app_name }}
    field_selectors:
      - status.phase=Running
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
  register: pod
  until: pod.resources | length > 0 and (pod.resources[0].status.containerStatuses[0].ready | default(false))
  retries: 60
  delay: 10

- name: Get pod name
  set_fact:
    pod_name: "{{ (pod.resources | first).metadata.name }}"

- name: Copy redis provision script to pod (kubernetes.core.k8s_cp)
  kubernetes.core.k8s_cp:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    namespace: "{{ namespace }}"
    pod: "{{ pod_name }}"
    container: "{{ app_name }}"
    local_path: "{{ role_path }}/files/redis.cmds"
    remote_path: /tmp/redis.cmds
    state: to_pod
  register: cp_result
  delay: 10
  retries: 12
  until: cp_result is succeeded

- name: Debug — redis.cmds copy to pod
  ansible.builtin.debug:
    msg:
      pod: "{{ pod_name }}"
      namespace: "{{ namespace }}"
      changed: "{{ cp_result.changed | default(false) }}"
      failed: "{{ cp_result.failed | default(false) }}"

- name: Load data in redis (kubernetes.core.k8s_exec)
  kubernetes.core.k8s_exec:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    namespace: "{{ namespace }}"
    pod: "{{ pod_name }}"
    container: "{{ app_name }}"
    command: /bin/sh -c "redis-cli -a '{{ redis_password }}' < /tmp/redis.cmds"
  register: load_result
  until: load_result is succeeded
  delay: 10
  retries: 12

- name: Debug — redis-cli batch load
  ansible.builtin.debug:
    msg:
      rc: "{{ load_result.rc }}"
      stdout: "{{ load_result.stdout | default('') }}"
      stderr: "{{ load_result.stderr | default('') }}"
