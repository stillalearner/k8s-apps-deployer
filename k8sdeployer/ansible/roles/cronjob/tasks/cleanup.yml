---
- name: Delete cronjob
  k8s:
    state: absent
    definition:
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: "{{ ext_app_name }}"
        namespace: "{{ namespace }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"

- name: Remove namespace
  k8s:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    name: "{{ namespace }}"
    api_version: v1
    kind: Namespace
    state: absent
    wait: yes
    wait_timeout: 600
  when: non_admin_user | bool == false
