---
- name: Ensure namespace exists (admin users only)
  k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ namespace }}"
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
  when: non_admin_user is defined and non_admin_user == false

- name: Verify namespace exists (read-only check for admin users)
  k8s_info:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    kind: Namespace
    name: "{{ namespace }}"
  register: ns_check
  until: ns_check.resources is defined and ns_check.resources | length > 0
  retries: 6
  delay: 5
  failed_when: ns_check.resources is not defined or ns_check.resources | length == 0
  when: non_admin_user is not defined or non_admin_user == false

- name: Create a PVC
  k8s:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    state: present
    namespace: "{{ namespace }}"
    definition: "{{ lookup('template', 'persistent-volume-claim.yml.j2') | from_yaml }}"
  vars:
    pvc_index: 1

- name: Create a VolumeSnapshot
  k8s:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    state: present
    namespace: "{{ namespace }}"
    definition: "{{ lookup('template', 'volumesnapshot.yml.j2') | from_yaml }}"
  vars:
    pvc_index: 1

- name: Provision a pod mount an empty PVC
  k8s:
    host: "{{ server }}"
    api_key: "{{ token }}"
    verify_ssl: "{{ verify_ssl }}"
    state: present
    namespace: "{{ namespace }}"
    definition: "{{ lookup('template', 'pod-with-a-empty-pvc.yml.j2') | from_yaml }}"
  vars:
    pvc_index: 1

- name: Sleep for a while to wait PVC bound
  pause:
    seconds: 20
